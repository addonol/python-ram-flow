<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 RAM-FLOW | Audit Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        {{ custom_css }}
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-8 md:p-12 text-slate-800">
    <div class="max-w-5xl mx-auto">

        <!-- Header Section -->
        <header class="flex justify-between items-start mb-12">
            <div>
                <h1 class="select-none">
                    RAM<span style="background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
                                    -webkit-background-clip: text;
                                    -webkit-text-fill-color: transparent;">FLOW</span>
                    <span class="dot" style="color: #2563eb;">.</span>
                </h1>
                <div class="mt-2">
                    <span class="mode-badge uppercase">{{ env }} MODE</span>
                </div>
            </div>

            <!-- Action Bar & GitHub -->
            <div class="flex flex-col items-end gap-3">
                <div class="flex gap-2">
                    <button id="btn-download-json"
                            class="flex items-center gap-2 px-4 py-2 rounded-lg glass
                                    border-slate-200 hover:bg-white transition-all
                                    text-slate-500 hover:text-blue-600">
                        <svg width="14" height="14" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                        </svg>
                        <span class="text-[10px] font-bold uppercase tracking-widest">
                            Download JSON
                        </span>
                    </button>
                </div>

                <a href="https://github.com/addonol/python-ram-flow"
                target="_blank"
                class="group flex items-center gap-4 px-5 py-2.5 rounded-2xl glass
                        border border-transparent hover:border-blue-400/50
                        transition-all duration-300 shadow-sm hover:shadow-md">

                    <div class="flex flex-col items-end">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">
                            PYTHON-RAM-FLOW
                        </span>
                        <span class="text-xs mono font-bold text-slate-700 group-hover:text-blue-600 transition-colors">
                            @addonol GITHUB  Project
                        </span>
                    </div>

                    <!-- Icône GitHub -->
                    <svg height="24" width="24" viewBox="0 0 16 16" class="fill-slate-800 group-hover:fill-blue-600 transition-colors">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                    </svg>
                </a>
            </div>
        </header>

        <!-- Tab Controls -->
        <input type="radio" name="tabs" id="tab1" class="tab-logic" checked>
        <input type="radio" name="tabs" id="tab2" class="tab-logic">
        <input type="radio" name="tabs" id="tab3" class="tab-logic">

        <!-- Navigation Bar -->
        <nav class="nav-container">
            <label for="tab1" class="tab-label l1">Executive Overview</label>
            <label for="tab2" class="tab-label l2">Execution Timeline</label>
            <label for="tab3" class="tab-label l3">System Context</label>
        </nav>

        <!-- Tab 1: Dashboard -->
        <div class="tab-content content1 animate-fade-in">
            {{ summary_cards }}
            {{ overview_diagnostics }}
        </div>

        <!-- Tab 2: Timeline -->
        <div class="tab-content content2 animate-fade-in">
            {{ table_content }}
        </div>

        <!-- Tab 3: Metadata -->
        <div class="tab-content content3 animate-fade-in">
            {{ metadata }}
        </div>

    </div>

    <!-- Export Logic Script -->
    <script>
        document.getElementById('btn-download-json').onclick = function() {
            const data = {{ raw_json_data }};
            const blob = new Blob(
                [JSON.stringify(data, null, 2)],
                { type: 'application/json' }
            );
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');

            // Build timestamp filename
            const now = new Date();
            const ts = now.toISOString().replace(/[:.]/g, '-').slice(0, 19);

            a.href = url;
            a.download = `ramflow-audit-${ts}.json`;
            document.body.appendChild(a);
            a.click();

            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        };
    </script>
</body>
</html>
